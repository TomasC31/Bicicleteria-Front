        <!-- formulario de registro -->
        <form class=" g-3 needs-validation"> 
                <h1 style="margin: 10px;">Registrarse en la Bicicleteria </h1>
                <input id="lt" name="lt" type="hidden" value="LT-17740233593681-VDY2n5Vc9Ewt860GBUCets2onQeuKIBnWJaLRHaU">
                <!--ingresar nombre usuario-->
                <div class="row" style="margin: 30px;"> 
                    <div class=" col-md-6 ">                   
                        <label class="">Usuario</label>
                        <input class="form-control" placeholder="Ingresa tu Usuario" type="text">
                        <a class="" href="#" id="forgot_password">¿Olvidaste el usuario?</a>   
                    </div>
                    <!-- Ingresar Mail  -->

                <div class="row" style="margin: 30px;">

                    </div>

                    </div>

                </div>
                <!--Boton para reguistrarse -->
                <div class="row" style="margin: 20px;">

                </div>
